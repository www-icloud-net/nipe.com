<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a2f73">
  <meta name="color-scheme" content="light">
  <title>Nipe International School | Report Cards</title>
  <link rel="icon" type="image/png" href="assets/nipe-school-logo.png">
  <link rel="apple-touch-icon" href="assets/nipe-school-logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader" class="loader-screen" aria-live="polite">
    <img src="assets/nipe-school-logo.png" alt="">
    <span class="spinner"></span>
  </div>

  <main id="verifyView" class="standalone-view hidden" aria-live="polite"></main>

  <main id="authView" class="auth-view hidden">
    <section class="auth-card">
      <div class="brand-lockup">
        <img src="assets/nipe-school-logo.png" alt="Nipe International School">
        <div>
          <h1>Nipe International School</h1>
          <p>Student Report Card System</p>
        </div>
      </div>
      <form id="loginForm" class="form-stack">
        <label class="field">
          <span>Email address</span>
          <input id="loginEmail" type="email" autocomplete="email" required>
        </label>
        <label class="field">
          <span>Password</span>
          <div class="password-wrap">
            <input id="loginPassword" type="password" autocomplete="current-password" required>
            <button id="togglePassword" class="icon-button" type="button" aria-label="Show password">
              <span aria-hidden="true">◉</span>
            </button>
          </div>
        </label>
        <button class="button primary full" type="submit">Sign in</button>
        <p id="authMessage" class="form-message" role="alert"></p>
      </form>
    </section>
  </main>

  <main id="mfaView" class="auth-view hidden">
    <section class="auth-card">
      <div class="brand-lockup compact">
        <img src="assets/nipe-school-logo.png" alt="">
        <div><h1>Security verification</h1><p>Nipe International School</p></div>
      </div>
      <div id="mfaQr" class="mfa-qr hidden"></div>
      <form id="mfaForm" class="form-stack">
        <label class="field">
          <span>Authentication code</span>
          <input id="mfaCode" inputmode="numeric" autocomplete="one-time-code" maxlength="8" required>
        </label>
        <button class="button primary full" type="submit">Verify</button>
        <button id="mfaSignOut" class="button ghost full" type="button">Sign out</button>
        <p id="mfaMessage" class="form-message" role="alert"></p>
      </form>
    </section>
  </main>

  <div id="appShell" class="app-shell hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img id="brandLogo" src="assets/nipe-school-logo.png" alt="">
        <div><strong id="brandName">Nipe International School</strong><small>Report Card System</small></div>
      </div>
      <nav id="mainNav" class="nav-list" aria-label="Primary"></nav>
      <div class="sidebar-foot">
        <div class="profile-chip">
          <span id="userAvatar" class="avatar">N</span>
          <span class="profile-copy"><strong id="userName">User</strong><small id="userRole">Viewer</small></span>
          <button id="logoutButton" class="icon-button inverse" type="button" aria-label="Sign out">↪</button>
        </div>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <button id="menuButton" class="icon-button mobile" type="button" aria-label="Open menu">☰</button>
          <div><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Academic performance overview</p></div>
        </div>
        <div class="topbar-actions">
          <button id="notificationButton" class="icon-button badge-button" type="button" aria-label="Notifications">
            <span>◆</span><b id="notificationBadge" class="badge hidden">0</b>
          </button>
          <div id="syncIndicator" class="sync-pill pending">
            <span class="sync-dot"></span><span id="syncLabel">Connecting</span>
          </div>
          <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh">↻</button>
        </div>
      </header>
      <div id="offlineBar" class="offline-bar hidden" role="button" tabindex="0"><span>Synchronisation queue</span><b id="outboxCount">0 pending</b></div>
      <main id="content" class="content" tabindex="-1"></main>
    </section>
  </div>

  <dialog id="modal" class="modal">
    <div class="modal-frame" role="document">
      <header class="modal-header">
        <div><h3 id="modalTitle"></h3><p id="modalSubtitle"></p></div>
        <button id="modalClose" class="icon-button" type="button" aria-label="Close">×</button>
      </header>
      <section id="modalBody" class="modal-body"></section>
      <footer id="modalFooter" class="modal-footer"></footer>
    </div>
  </dialog>

  <div id="toastStack" class="toast-stack" aria-live="polite"></div>
  <div id="qrScratch" class="qr-scratch" aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.4.0/dist/docx-preview.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
